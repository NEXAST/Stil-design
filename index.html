<!DOCTYPE html>
<html lang="hr">
<head>
    <meta charset="UTF-8">
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            line-height: 1.6;
            background-color: #F9F7F2; /* Krem pozadina sa slike */
            color: #2D4F3E; /* Tamno zelena boja teksta */
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .card {
            background: white;
            padding: 40px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            max-width: 500px;
            width: 90%;
            border-top: 5px solid #C5A880; /* Zlatni akcenat */
        }

        h3 {
            color: #2D4F3E;
            text-transform: uppercase;
            letter-spacing: 2px;
            border-bottom: 1px solid #C5A880;
            padding-bottom: 10px;
            margin-bottom: 20px;
            font-family: serif; /* Elegantniji font za naslov */
        }

        .services-list {
            list-style-type: none;
            padding-left: 0;
        }

        .service-item {
            margin-bottom: 12px;
            font-size: 16px;
            display: flex;
            align-items: center;
        }

        .service-item::before {
            content: "•";
            color: #C5A880; /* Zlatni kružići */
            font-weight: bold;
            display: inline-block; 
            width: 1em;
            margin-right: 10px;
        }

        .instagram-link {
            margin-top: 30px;
            display: block;
            text-align: center;
            text-decoration: none;
            color: #2D4F3E;
            font-weight: bold;
            transition: color 0.3s ease;
            font-size: 18px;
        }

        .instagram-link:hover {
            color: #C5A880;
        }

        .brand-name {
            font-family: serif;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

    <div class="card">
        <h3>Naše Usluge:</h3>
        <ul class="services-list">
            <li class="service-item">Mjerenje na terenu</li>
            <li class="service-item">Izrada 3D crteža namještaja</li>
            <li class="service-item">Izrada i montaža namještaja po mjeri</li>
            <li class="service-item">Usluge krojenja i kantovanja pločastih materijala</li>
        </ul>

        <a href="https://www.instagram.com/stilnamjestaj23/" target="_blank" class="instagram-link">
            Zapratite nas: <span class="brand-name">Stil Design</span>
        </a>
    </div>

</body>
</html>
